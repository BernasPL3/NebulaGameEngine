name: Build Nebula macOS

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install cmake sdl2

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build
        run: cmake --build build --config Release

      - name: Create App Bundle
        run: |
          mkdir -p Nebula.app/Contents/MacOS
          mkdir -p Nebula.app/Contents/Resources

          cp build/Nebula Nebula.app/Contents/MacOS/Nebula
          cp Assets/Nebula.icns Nebula.app/Contents/Resources/Nebula.icns

          cat > Nebula.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Nebula Game Engine</string>

              <key>CFBundleDisplayName</key>
              <string>Nebula Game Engine</string>

              <key>CFBundleExecutable</key>
              <string>Nebula</string>

              <key>CFBundleIdentifier</key>
              <string>com.nebula.engine</string>

              <key>CFBundleVersion</key>
              <string>0.1</string>

              <key>CFBundleShortVersionString</key>
              <string>0.1</string>

              <key>CFBundlePackageType</key>
              <string>APPL</string>

              <key>CFBundleIconFile</key>
              <string>Nebula.icns</string>
          </dict>
          </plist>
          EOF

      - name: Zip App
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
          Nebula.app Nebula-macOS.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nebula-macOS
          path: Nebula-macOS.zip
